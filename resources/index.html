<!DOCTYPE html>
<html>
    <head>
        <title>DISPO Map</title>
        <meta charset="UTF-8">
        <script type="text/javascript" src="js/app.js"></script>
        <script type="text/javascript" src="https://maps.infoware.de/MapAPI-1.4/js/core.js?vnr=0&pnr=0&modules=datalayers,routing,controls,graphics,clustering"></script>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <div id="map-container">
            <div id="controls">
                <button id="geo-btn">Show address</button>
                <label>Street <input type="text" id="street" /></label>
                <label>StreetNumber <input type="text" id="streetnumber" /></label>
                <label>Postalcode <input type="text" id="postalcode" /></label>
                <label>City <input type="text" id="city" /></label>
                <label>Country (Country code) <input type="text" id="country" /></label>
            </div>

            <div id="map"></div>
        </div>
    </body>
</html>
